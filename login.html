<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login | Harps Tech Escrow</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a; --bg-card:#1a2234; --text:#ffffff; --text-muted:#9ca3af;
  --accent:#ff6b00; --border:#2d3748; --gradient:linear-gradient(135deg,#ff6b00 0%,#ff8533 100%);
  --error:#ef4444; --success:#10b981;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:20px; overflow:hidden;
}
body::before{
  content:''; position:fixed; top:0;left:0; width:100%;height:100%;
  background:radial-gradient(circle at 30% 50%,rgba(255,107,0,0.2) 0%,transparent 50%),
             radial-gradient(circle at 70% 20%,rgba(255,133,51,0.15) 0%,transparent 50%);
  z-index:0;
}
.container{
  position:relative; z-index:1; width:100%; max-width:440px;
  background:var(--bg-card); border:1px solid var(--border); border-radius:24px;
  padding:45px 35px; box-shadow:0 30px 60px rgba(0,0,0,0.5); backdrop-filter:blur(10px);
}
.logo{text-align:center; margin-bottom:35px; font-family:'Space Grotesk',sans-serif; font-size:2rem; font-weight:700;}
.logo span{color:var(--accent)}
.tabs{display:flex; gap:10px; margin-bottom:30px; background:var(--bg); padding:5px; border-radius:12px;}
.tab{flex:1; padding:12px; text-align:center; border-radius:8px; cursor:pointer; font-weight:600; transition:0.3s; color:var(--text-muted);}
.tab.active{background:var(--gradient); color:white;}
.form{display:none; animation:fadeIn 0.4s ease;}
.form.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)}}
.input-group{position:relative; margin-bottom:20px;}
.input-group input{
  width:100%; padding:14px 45px 14px 16px; background:var(--bg); border:2px solid var(--border);
  border-radius:12px; color:var(--text); font-size:1rem; transition:0.3s; outline:none;
}
.input-group input:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(255,107,0,0.1);}
.input-group label{
  position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--text-muted);
  pointer-events:none; transition:0.3s; background:var(--bg); padding:0 5px;
}
.input-group input:focus + label, .input-group input:not(:placeholder-shown) + label{
  top:0; font-size:0.85rem; color:var(--accent);
}
.eye-toggle{position:absolute; right:15px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--text-muted);}
.eye-toggle:hover{color:var(--accent)}
.btn{
  width:100%; padding:15px; background:var(--gradient); border:none; border-radius:12px;
  color:white; font-weight:700; font-size:1rem; cursor:pointer; transition:0.3s; margin-top:10px;
}
.btn:hover{transform:translateY(-2px); box-shadow:0 15px 30px rgba(255,107,0,0.4);}
.btn:disabled{opacity:0.6; cursor:not-allowed;}
.forgot{text-align:right; margin-top:-10px; margin-bottom:20px;}
.forgot a{color:var(--accent); text-decoration:none; font-size:0.9rem;}
.divider{display:flex; align-items:center; gap:15px; margin:25px 0; color:var(--text-muted); font-size:0.9rem;}
.divider::before,.divider::after{content:''; flex:1; height:1px; background:var(--border);}
.btn-google{background:var(--bg); border:2px solid var(--border); display:flex; align-items:center; justify-content:center; gap:10px;}
.btn-google:hover{border-color:var(--accent); background:var(--bg-card);}
.message{padding:12px 16px; border-radius:10px; margin-bottom:20px; font-size:0.9rem; display:none;}
.message.error{background:rgba(239,68,68,0.1); border:1px solid var(--error); color:var(--error); display:block;}
.message.success{background:rgba(16,185,129,0.1); border:1px solid var(--success); color:var(--success); display:block;}
.back-link{text-align:center; margin-top:25px; color:var(--text-muted);}
.back-link a{color:var(--accent); text-decoration:none; font-weight:600;}
.loading{display:inline-block; width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="container">
  <div class="logo">Harps<span>Escrow</span></div>
  
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Login</div>
    <div class="tab" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <div id="message" class="message"></div>

  <!-- Login Form -->
  <form class="form active" id="loginForm">
    <div class="input-group">
      <input type="email" id="loginEmail" placeholder=" " required>
      <label>Email</label>
    </div>
    
    <div class="input-group">
      <input type="password" id="loginPassword" placeholder=" " required>
      <label>Password</label>
      <span class="eye-toggle" onclick="togglePassword('loginPassword',this)">👁️</span>
    </div>
    
    <div class="forgot">
      <a href="#" onclick="forgotPassword()">Forgot Password?</a>
    </div>
    
    <button type="submit" class="btn" id="loginBtn">Login</button>
    
    <div class="divider">or</div>
    
    <button type="button" class="btn btn-google" onclick="loginWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
      </svg>
      Continue with Google
    </button>
  </form>

  <!-- Signup Form -->
  <form class="form" id="signupForm">
    <div class="input-group">
      <input type="text" id="signupName" placeholder=" " required>
      <label>Full Name</label>
    </div>
    
    <div class="input-group">
      <input type="email" id="signupEmail" placeholder=" " required>
      <label>Email</label>
    </div>
    
    <div class="input-group">
      <input type="password" id="signupPassword" placeholder=" " required minlength="6">
      <label>Password</label>
      <span class="eye-toggle" onclick="togglePassword('signupPassword',this)">👁️</span>
    </div>
    
    <div class="input-group">
      <input type="password" id="signupConfirm" placeholder=" " required>
      <label>Confirm Password</label>
      <span class="eye-toggle" onclick="togglePassword('signupConfirm',this)">👁️</span>
    </div>
    
    <button type="submit" class="btn" id="signupBtn">Create Account</button>
  </form>

  <div class="back-link">
    <a href="index.html">← Back to Home</a>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { 
  getAuth, 
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  sendPasswordResetEmail,
  GoogleAuthProvider,
  signInWithPopup,
  updateProfile,
  onAuthStateChanged
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDz7bgFTWTm3tlzNB8qSo9wzem9sj4N2Fo",
  authDomain: "harps-escrow.firebaseapp.com",
  projectId: "harps-escrow",
  storageBucket: "harps-escrow.firebasestorage.app",
  messagingSenderId: "602261203420",
  appId: "1:602261203420:web:f5d76b79d7fc85a143c719",
  measurementId: "G-3XDHY97SXB"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const ADMIN_EMAIL = 'okugbepraise@gmail.com';

// Auto redirect if already logged in
onAuthStateChanged(auth, user => {
  if(user){
    if(user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()){
      window.location.href = 'admin.html';
    }else{
      window.location.href = 'marketplace.html';
    }
  }
});

// Tab Switcher
window.switchTab = function(tab){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab + 'Form').classList.add('active');
  clearMessage();
}

// Password Toggle
window.togglePassword = function(id,el){
  const input = document.getElementById(id);
  if(input.type === 'password'){
    input.type = 'text';
    el.textContent = '🙈';
  }else{
    input.type = 'password';
    el.textContent = '👁️';
  }
}

// Show Message
function showMessage(msg,type='error'){
  const msgEl = document.getElementById('message');
  msgEl.textContent = msg;
  msgEl.style.display = 'block';
  msgEl.className = 'message ' + type;
}

function clearMessage(){
  document.getElementById('message').style.display = 'none';
}

// Login
document.getElementById('loginForm').addEventListener('submit',async(e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>';
  
  try{
    await signInWithEmailAndPassword(auth,email,password);
  }catch(error){
    showMessage(getErrorMessage(error.code));
    btn.disabled = false;
    btn.textContent = 'Login';
  }
});

// Signup - THIS IS THE FIX
document.getElementById('signupForm').addEventListener('submit',async(e) => {
  e.preventDefault();
  const btn = document.getElementById('signupBtn');
  const name = document.getElementById('signupName').value;
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;
  const confirm = document.getElementById('signupConfirm').value;
  
  if(password !== confirm){
    showMessage('Passwords do not match');
    return;
  }
  
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>';
  
  try{
    const userCredential = await createUserWithEmailAndPassword(auth,email,password);
    await updateProfile(userCredential.user,{displayName:name});
    
    // Create Firestore user doc so profile page works
    await setDoc(doc(db,'users',userCredential.user.uid),{
      email: email,
      displayName: name,
      walletBalance: 0,
      totalSales: 0,
      isBanned: false,
      createdAt: new Date()
    });
    
    showMessage('Account created successfully! Redirecting...','success');
    
  }catch(error){
    showMessage(getErrorMessage(error.code));
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
});

// Forgot Password
window.forgotPassword = async function(){
  const email = document.getElementById('loginEmail').value;
  
  if(!email){
    showMessage('Please enter your email first');
    return;
  }
  
  try{
    await sendPasswordResetEmail(auth,email);
    showMessage('Password reset email sent! Check your inbox','success');
  }catch(error){
    showMessage(getErrorMessage(error.code));
  }
}

// Google Login
window.loginWithGoogle = async function(){
  try{
    const result = await signInWithPopup(auth,provider);
    
    // Create user doc if it doesn't exist
    const userDoc = await getDoc(doc(db,'users',result.user.uid));
    if(!userDoc.exists()){
      await setDoc(doc(db,'users',result.user.uid),{
        email: result.user.email,
        displayName: result.user.displayName,
        walletBalance: 0,
        totalSales: 0,
        isBanned: false,
        createdAt: new Date()
      });
    }
    
  }catch(error){
    showMessage(getErrorMessage(error.code));
  }
}

// Error Messages
function getErrorMessage(code){
  switch(code){
    case 'auth/user-not-found': return 'No account found with this email';
    case 'auth/wrong-password': return 'Incorrect password';
    case 'auth/email-already-in-use': return 'Email already in use';
    case 'auth/weak-password': return 'Password should be at least 6 characters';
    case 'auth/invalid-email': return 'Invalid email address';
    case 'auth/too-many-requests': return 'Too many attempts. Try again later';
    case 'auth/popup-blocked': return 'Popup blocked. Allow popups and try again';
    default: return 'An error occurred. Please try again';
  }
}
</script>

</body>
</html>
